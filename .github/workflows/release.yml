name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Release (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          
      - name: Build release binary
        run: cargo build --release --verbose

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: metaphor-save-edit-windows
          path: target/release/metaphor-save-edit.exe

  build-linux:
    name: Build Release (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: metaphor-save-edit-linux
          path: target/release/metaphor-save-edit

  create-release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: metaphor-save-edit-windows
          path: ./artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: metaphor-save-edit-linux
          path: ./artifacts/linux

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/windows/metaphor-save-edit.exe
            ./artifacts/linux/metaphor-save-edit
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
